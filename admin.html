<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - WhatsApp Clone</title>
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="stylesheet" href="css/admin.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="admin-nav">
                <a href="#" class="active" data-target="dashboard">Dashboard</a>
                <a href="#" data-target="users">Manage Users</a>
                <a href="#" data-target="chats">Manage Chats</a>
            </nav>
            <div class="admin-logout">
                <button id="btn-admin-logout" class="btn-danger">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Dashboard Section -->
            <section id="dashboard" class="admin-section active">
                <h1>Dashboard Summary</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="stat-users">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Chats</h3>
                        <p id="stat-chats">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Messages</h3>
                        <p id="stat-messages">0</p>
                    </div>
                </div>
            </section>

            <!-- Users Section -->
            <section id="users" class="admin-section">
                <div class="section-header">
                    <h1>Manage Users</h1>
                    <button id="btn-clear-all-users" class="btn-danger">Clear All Users</button>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Avatar</th>
                                <th>Full Name</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Chats Section -->
            <section id="chats" class="admin-section">
                <div class="section-header">
                    <h1>Manage Chats</h1>
                    <button id="btn-clear-all-chats" class="btn-danger">Clear All Chats</button>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Chat ID</th>
                                <th>Last Message</th>
                                <th>Time</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="chats-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK will be loaded in admin.js -->
    <script type="module" src="js/admin.js"></script>
</body>
</html>
